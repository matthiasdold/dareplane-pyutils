name: Build and Publish Python Package

on:
  push:
    tags:
      - 'v*'  # Triggers the workflow when a tag starting with 'v' is pushed (e.g., v1.0.0), only trigger on tag (cannot combine this with filter on branch...)

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # These permissions are required for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write  # Required to authenticate with PyPI
      contents: read   # Required to checkout the code

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x' # Uses the latest stable Python 3 release

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build the package (sdist and wheel)
        run: python -m build

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
